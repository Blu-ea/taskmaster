task:
  my_server:
    cmd: "/bin/my_server -u user"
    num_procs: 1
    auto_start: false
    auto_restart: always
    normal_exit_code:
      - 0
      - 2
    startup_grace_period: 5
    stop_signal: TERM
    log_file:
      stdout: "/tmp/log/my_server.log"
      stderr: discard
    umask: "022"

  other_service:
    cmd: "/bin/other_service"
    num_procs: 2
    auto_start: false
    auto_restart: no
    startup_grace_period: 5
    stop_signal: TERM
    log_file:
      stdout: "/tmp/log/my_server2.log"
      stderr: discard
    umask: "777"